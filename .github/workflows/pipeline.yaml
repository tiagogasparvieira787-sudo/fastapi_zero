name: pipeline
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Instalar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Instalar o uv
        run: pipx install uv
      
      - name: Instalar as dependências
        run: uv install

      - name: Executar os testes
        run: uv run task test